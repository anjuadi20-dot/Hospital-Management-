{% extends "base.html" %}

{% block title %}Register Face{% endblock %}

{% block content %}
<h2>Register Face for {{ doctor.name }}</h2>
<form method="POST" enctype="multipart/form-data" id="faceForm">
    <input type="hidden" name="image_data" id="image_data">
    <div class="mb-3">
        <label class="form-label">Use Camera</label>
        <video id="camera" class="w-100 rounded mb-2" autoplay playsinline></video>
        <button type="button" class="btn btn-secondary mb-3" id="captureBtn">Capture Photo</button>
        <div id="previewContainer" class="mb-3 d-none">
            <p class="mb-1">Preview:</p>
            <img id="preview" class="img-fluid rounded shadow-sm" alt="Captured face preview">
        </div>
        <label for="face_image" class="form-label">Or upload face image</label>
        <input type="file" class="form-control" id="face_image" name="face_image" accept="image/*">
        <small class="form-text text-muted">
            <strong>Image Requirements:</strong><br>
            • Minimum size: 1 KB<br>
            • Maximum size: 100 MB<br>
            • Supported formats: JPG, PNG, GIF, WebP, etc.
        </small>
    </div>
    <button type="submit" class="btn btn-primary">Register Face</button>
</form>
<canvas id="canvas" class="d-none"></canvas>
<script>
const video = document.getElementById('camera');
const canvas = document.getElementById('canvas');
const imageDataInput = document.getElementById('image_data');
const captureBtn = document.getElementById('captureBtn');
const preview = document.getElementById('preview');
const previewContainer = document.getElementById('previewContainer');
const fileInput = document.getElementById('face_image');
const form = document.getElementById('faceForm');

const MIN_FILE_SIZE = 1024; // 1KB
const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100MB

async function initCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    } catch (err) {
        console.warn('Camera not accessible:', err);
        video.style.display = 'none';
        captureBtn.style.display = 'none';
    }
}

captureBtn.addEventListener('click', () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/png');
    imageDataInput.value = dataUrl;
    preview.src = dataUrl;
    previewContainer.classList.remove('d-none');
});

// Client-side file size validation
fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        // Clear camera capture data when file is selected
        imageDataInput.value = '';
        previewContainer.classList.add('d-none');
        
        const fileSizeInBytes = file.size;
        
        if (fileSizeInBytes < MIN_FILE_SIZE) {
            alert(`Image size is too small. Minimum size is 1 KB.\nYour file size: ${(fileSizeInBytes / 1024).toFixed(2)} KB`);
            fileInput.value = '';
            return;
        }
        
        if (fileSizeInBytes > MAX_FILE_SIZE) {
            alert(`Image size is too large. Maximum size is 100 MB.\nYour file size: ${(fileSizeInBytes / (1024 * 1024)).toFixed(2)} MB`);
            fileInput.value = '';
            return;
        }
    }
});

// Form submission validation
form.addEventListener('submit', function(e) {
    const hasImageData = imageDataInput.value.trim() !== '';
    const hasFile = fileInput.files.length > 0;
    
    if (!hasImageData && !hasFile) {
        e.preventDefault();
        alert('Please provide a face image using the camera or upload a file.');
        return false;
    }
});

window.addEventListener('load', initCamera);
</script>
{% endblock %}
